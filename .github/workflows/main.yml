name: Android SDK 35 Build Engine

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually click "Run" anytime

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Clone Source Repository
        uses: actions/checkout@v4

      - name: 2. Initialize Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Initialize & Cache Gradle Dependency Engine
        uses: gradle/actions/setup-gradle@v4

      - name: 4. Auto-Sign Android SDK 34 & 35 Licenses
        run: |
          mkdir -p -m 0755 $ANDROID_HOME/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb74bf679004a47cdb88\n24333f1a63b68bfa3d3d315fbc7e67db891a60f1\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910\n3513622d98304fc4fb558b76fb0801b96a8413d4\ne9ac30d07e0746f33c6107173e61538fed2af4da" > $ANDROID_HOME/licenses/android-sdk-license

      - name: 5. Execute Android Production Compile
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 6. Extract Compiled APK Binary Assets
        uses: actions/upload-artifact@v4
        with:
          name: CloudForge-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

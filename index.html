<body class="bg-background text-on-surface font-body-md text-body-md overflow-hidden">
<header class="fixed top-0 w-full z-40 bg-surface-container flex items-center justify-between px-margin-mobile h-toolbar-height transition-colors" id="top-app-bar">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-variant transition-colors active:scale-95 duration-100" onclick="toggleDrawer()">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<span class="font-headline-sm text-headline-sm font-bold text-primary truncate max-w-[120px] sm:max-w-none">CodeForge</span>
</div>
<div class="flex items-center gap-1 sm:gap-2">
<button class="flex items-center gap-1 px-3 py-1.5 rounded-full hover:bg-surface-variant text-primary transition-colors active:scale-95 duration-100" onclick="saveActiveFile()">
<span class="material-symbols-outlined text-[20px]">save</span>
<span class="text-label-sm font-label-sm hidden xs:inline">Save</span>
</button>
<button class="flex items-center gap-1 px-3 py-1.5 rounded-full hover:bg-surface-variant text-tertiary transition-colors active:scale-95 duration-100" onclick="triggerGitHubSync()">
<span class="material-symbols-outlined text-[20px]">cloud_upload</span>
<span class="text-label-sm font-label-sm hidden xs:inline">Push</span>
</button>
<button class="p-2 rounded-full hover:bg-surface-variant transition-colors active:scale-95 duration-100" onclick="toggleTerminal()">
<span class="material-symbols-outlined text-primary">terminal</span>
</button>
</div>
</header>
<aside class="fixed left-0 top-0 h-full w-[280px] bg-surface-container-low dark:bg-surface-container-low rounded-r-xl z-50 shadow-md transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col py-4" id="nav-drawer">
<div class="px-6 mb-4 flex justify-between items-center">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Explorer</h2>
<button class="p-2 rounded-full hover:bg-surface-variant" onclick="toggleDrawer()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto px-2 space-y-1" id="file-tree">
</div>
</aside>
<div class="fixed inset-0 bg-black/60 z-45 opacity-0 pointer-events-none transition-opacity duration-300 backdrop-blur-[2px]" id="drawer-overlay" onclick="toggleDrawer(false)"></div>
<main class="pt-toolbar-height flex flex-col w-full h-full relative" id="main-canvas">
<div class="flex overflow-x-auto scrollbar-hide bg-surface border-b border-outline-variant shrink-0 h-12" id="tab-bar">
</div>
<div class="flex-1 relative overflow-hidden flex flex-col" id="editor-wrapper">
<div class="absolute inset-0 flex flex-col items-center justify-center text-on-surface-variant p-8 text-center space-y-4" id="empty-state">
<span class="material-symbols-outlined text-6xl opacity-20">code_blocks</span>
<p class="font-title-md text-title-md">No files open</p>
<p class="font-body-md text-body-md">Select a file from the explorer to start building.</p>
<button class="px-6 py-2 bg-primary-container text-on-primary-container rounded-full font-label-sm" onclick="toggleDrawer()">
                    Open Explorer
                </button>
</div>
<div class="hidden flex-1 overflow-auto bg-surface p-editor-padding font-code-md text-code-md outline-none whitespace-pre" contenteditable="true" id="code-editor" oninput="handleCodeInput(event)" spellcheck="false"></div>
</div>
</main>
<button class="fixed bottom-10 right-6 w-14 h-14 bg-primary text-on-primary rounded-2xl shadow-xl flex items-center justify-center z-30 active:scale-90 transition-transform" id="fab-run" onclick="runBuild()">
<span class="material-symbols-outlined text-3xl">play_arrow</span>
</button>
<div class="fixed inset-0 z-45 bg-black/40 opacity-0 pointer-events-none transition-opacity duration-300" id="terminal-backdrop" onclick="closeTerminal()"></div>
<div class="fixed inset-x-0 bottom-0 z-50 transform translate-y-full transition-transform duration-300 ease-in-out bg-surface-container-highest rounded-t-[28px] shadow-2xl h-[353px] flex flex-col" id="terminal-sheet">
<div class="flex items-center justify-center pt-3 pb-2 cursor-pointer" onclick="closeTerminal()">
<div class="w-8 h-1 bg-outline-variant rounded-full"></div>
</div>
<div class="px-6 py-2 border-b border-outline-variant flex justify-between items-center">
<span class="font-title-md text-title-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">terminal</span> Terminal Output
            </span>
<button class="p-1 rounded-full hover:bg-surface-variant" onclick="closeTerminal()">
<span class="material-symbols-outlined">expand_more</span>
</button>
</div>
<div class="flex-1 overflow-y-auto p-4 font-code-sm text-code-sm bg-surface-container-lowest text-secondary selection:bg-secondary-container" id="terminal-output">
</div>
</div>
<div class="fixed inset-0 z-[55] bg-black/40 opacity-0 pointer-events-none transition-opacity duration-300" id="context-backdrop" onclick="closeContextMenu()"></div>
<div class="fixed inset-x-0 bottom-0 z-[60] transform translate-y-full transition-transform duration-300 ease-in-out bg-surface-container rounded-t-[28px] shadow-2xl pb-8" id="context-sheet">
<div class="flex items-center justify-center pt-3 pb-4">
<div class="w-8 h-1 bg-outline-variant rounded-full"></div>
</div>
<div class="px-6 mb-4" id="context-header">

<div class="flex flex-col" id="context-actions">
</div>
</div>
<div class="fixed inset-0 z-[100] flex items-center justify-center hidden" id="generic-modal">
<div class="absolute inset-0 bg-black/60" id="modal-backdrop" onclick="closeModal()"></div>
<div class="bg-surface-container-high rounded-[28px] p-6 w-[85%] max-w-sm z-10 shadow-2xl relative">

<p class="mt-2 text-body-md text-on-surface-variant hidden" id="modal-description"></p>
</div>
<div class="flex justify-end gap-2 mt-6">
<button class="px-4 py-2 text-primary font-label-sm rounded-full hover:bg-surface-variant" id="modal-cancel-btn" onclick="closeModal()">Cancel</button>
<button class="px-6 py-2 bg-primary text-on-primary font-label-sm rounded-full hover:bg-opacity-90" id="modal-confirm">Confirm</button>
</div>
</div>
</div>

        const state = {
            files: [],
            openTabs: [],
            activeTabId: null,
            isDrawerOpen: false,
            isBuilding: false,
            isTerminalOpen: false,
            selectedContextFile: null,
            isModalOpen: false,
            isContextMenuOpen: false
        };

        function getFileIcon(file) {
            if (file.isFolder) return SVGS.folder;
            const name = file.name.toLowerCase();
            const ext = name.split('.').pop();
            if (name.endsWith('.apk')) return SVGS.apk;
            if (name.endsWith('.gradle.kts')) return SVGS.gradle;
            switch (ext) {
                case 'kt': return SVGS.kotlin;
                case 'java': return SVGS.java;
                case 'xml': return SVGS.xml;
                case 'gradle': return SVGS.gradle;
                case 'md': return SVGS.md;
                case 'json': return SVGS.json;
                case 'css': return SVGS.css;
                case 'js': return SVGS.js;
                default: return SVGS.file;
            }
        }

        function updateEditorReadOnly() {
            const editor = document.getElementById('code-editor');
            const shouldBeReadOnly = state.isDrawerOpen || state.isTerminalOpen || state.isModalOpen || state.isContextMenuOpen;
            
            if (shouldBeReadOnly) {
                editor.contentEditable = "false";
                editor.classList.add('editor-readonly');
            } else {
                editor.contentEditable = "true";
                editor.classList.remove('editor-readonly');
            }
        }

        function toggleDrawer() {
            const drawer = document.getElementById('nav-drawer');
            const overlay = document.getElementById('drawer-overlay');
            state.isDrawerOpen = !state.isDrawerOpen;
            
            if (state.isDrawerOpen) {
                drawer.classList.remove('-translate-x-full');
                overlay.classList.add('overlay-active');
                overlay.classList.add('pointer-events-auto');
            } else {
                drawer.classList.add('-translate-x-full');
                overlay.classList.remove('overlay-active');
                overlay.classList.remove('pointer-events-auto');
            }
            updateEditorReadOnly();
        }

        function toggleTerminal() {
            state.isTerminalOpen = !state.isTerminalOpen;
            if (state.isTerminalOpen) {
                document.getElementById('terminal-sheet').classList.remove('translate-y-full');
                document.getElementById('terminal-backdrop').classList.add('overlay-active');
            } else {
                closeTerminal();
            }
            updateEditorReadOnly();
        }

        function closeTerminal() { 
            state.isTerminalOpen = false;
            document.getElementById('terminal-sheet').classList.add('translate-y-full');
            document.getElementById('terminal-backdrop').classList.remove('overlay-active');
            updateEditorReadOnly();
        }

        function showSnackbar(message) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-surface-container-high text-on-surface px-6 py-3 rounded-full text-label-sm shadow-xl z-[200] transition-opacity";
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2000);
        }

        async function loadSystemWorkspace() {
            try {
                const response = await fetch('/api/files');
                const data = await response.json();
                if (data.success) {
                    state.files = data.files;
                    renderFileTree();
                } else {
                    showSnackbar("Failed to fetch repository layout components.");
                }
            } catch (err) {
                showSnackbar("Error maps connecting to core action agent API.");
            }
        }

        function renderFileTree() {
            const treeEl = document.getElementById('file-tree');
            treeEl.innerHTML = '';
            
            function createNode(file, depth = 0) {
                const container = document.createElement('div');
                const paddingLeft = depth * 12 + 8;
                const item = document.createElement('div');
                item.className = `flex items-center gap-3 py-2 px-3 rounded-xl cursor-pointer hover:bg-surface-variant transition-colors group relative ${state.activeTabId === file.id ? 'bg-secondary-container text-on-secondary-container' : ''}`;
                item.style.paddingLeft = `${paddingLeft}px`;
                
                const iconContainer = document.createElement('div');
                iconContainer.className = 'flex items-center justify-center w-6 h-6';
                iconContainer.innerHTML = getFileIcon(file);

                const label = document.createElement('span');
                label.className = 'flex-1 truncate font-label-sm';
                label.innerText = file.name;

                const moreBtn = document.createElement('button');
                moreBtn.className = 'opacity-0 group-hover:opacity-100 p-1 rounded-full hover:bg-primary-container/20 transition-opacity';
                moreBtn.innerHTML = '<span class="material-symbols-outlined text-[20px]">more_vert</span>';
                moreBtn.onclick = (e) => { e.stopPropagation(); openContextMenu(file); };

                item.appendChild(iconContainer);
                item.appendChild(label);
                item.appendChild(moreBtn);
                
                item.onclick = () => {
                    if (file.isFolder) {
                        file.isOpen = !file.isOpen;
                        renderFileTree();
                    } else {
                        openFile(file);
                        if (window.innerWidth < 768) toggleDrawer();
                    }
                };
                container.appendChild(item);
                if (file.isFolder && file.isOpen && file.children) {
                    file.children.sort((a, b) => (b.isFolder - a.isFolder) || a.name.localeCompare(b.name)).forEach(child => container.appendChild(createNode(child, depth + 1)));
                }
                return container;
            }
            state.files.sort((a, b) => (b.isFolder - a.isFolder) || a.name.localeCompare(b.name)).forEach(file => treeEl.appendChild(createNode(file)));
        }

        function findFileInTree(nodes, id) {
            for (let n of nodes) {
                if (n.id === id) return n;
                if (n.children) {
                    const found = findFileInTree(n.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function openFile(file) {
            if (!state.openTabs.find(t => t.id === file.id)) {
                state.openTabs.push({...file, originalContent: file.content}); 
            }
            state.activeTabId = file.id;
            renderTabs();
            renderEditor();
        }

        function renderTabs() {
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = '';
            state.openTabs.forEach(file => {
                const tab = document.createElement('div');
                const isActive = state.activeTabId === file.id;
                tab.className = `flex items-center gap-2 px-4 h-full shrink-0 cursor-pointer transition-all ${isActive ? 'tab-active bg-surface-container-high' : 'text-on-surface-variant hover:bg-surface-variant'}`;
                tab.innerHTML = `<span class="text-label-sm font-label-sm">${file.name}${file.dirty ? '*' : ''}</span><button class="p-1 rounded-full hover:bg-outline-variant/20 close-tab-btn"><span class="material-symbols-outlined text-[14px]">close</span></button>`;
                tab.querySelector('.close-tab-btn').onclick = (e) => { e.stopPropagation(); closeTab(file.id); };
                tab.onclick = () => { state.activeTabId = file.id; renderTabs(); renderEditor(); };
                bar.appendChild(tab);
            });
            const isEmpty = state.openTabs.length === 0;
            document.getElementById('empty-state').classList.toggle('hidden', !isEmpty);
            document.getElementById('code-editor').classList.toggle('hidden', isEmpty);
        }

        function closeTab(id) {
            const tab = state.openTabs.find(t => t.id === id);
            if (!tab) return;
            if (tab.dirty) {
                showWarningDialog(
                    "Unsaved Changes",
                    `You have unsaved changes in ${tab.name}. Do you want to close anyway?`,
                    "Close Anyway",
                    () => forceCloseTab(id)
                );
                return;
            }
            forceCloseTab(id);
        }

        function forceCloseTab(id) {
            state.openTabs = state.openTabs.filter(t => t.id !== id);
            if (state.activeTabId === id) {
                state.activeTabId = state.openTabs.length > 0 ? state.openTabs[state.openTabs.length - 1].id : null;
            }
            closeModal();
            renderTabs();
            renderEditor();
        }

        async function saveActiveFile() {
            const tab = state.openTabs.find(t => t.id === state.activeTabId);
            if (!tab) return;
            
            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filePath: tab.path, content: tab.content })
                });
                const result = await response.json();
                if (result.success) {
                    const coreFile = findFileInTree(state.files, tab.id);
                    if (coreFile) coreFile.content = tab.content;
                    tab.dirty = false;
                    tab.originalContent = tab.content;
                    renderTabs();
                    showSnackbar("File saved to build container.");
                } else {
                    showSnackbar("Error: " + result.error);
                }
            } catch (err) {
                showSnackbar("Network disconnect saving transaction data.");
            }
        }

        function renderEditor() {
            const editor = document.getElementById('code-editor');
            const file = state.openTabs.find(t => t.id === state.activeTabId);
            if (!file) return;
            const ext = file.name.split('.').pop();
            const langMap = { 'kt': 'kotlin', 'java': 'java', 'gradle': 'groovy', 'xml': 'markup', 'html': 'markup', 'md': 'markdown', 'css': 'css', 'js': 'javascript', 'json': 'json' };
            const lang = langMap[ext] || 'javascript';
            
            editor.innerText = file.content || '';
            const highlighted = Prism.highlight(file.content || '', Prism.languages[lang] || Prism.languages.javascript, lang);
            editor.innerHTML = highlighted;
        }

        function handleCodeInput(e) {
            const file = state.openTabs.find(t => t.id === state.activeTabId);
            if (file) {
                file.content = e.target.innerText;
                file.dirty = file.content !== file.originalContent;
                renderTabs();
            }
        }

        function runBuild() {
            if (state.isBuilding) return;
            state.isBuilding = true;
            
            const terminal = document.getElementById('terminal-sheet');
            const backdrop = document.getElementById('terminal-backdrop');
            const output = document.getElementById('terminal-output');
            
            backdrop.classList.add('overlay-active');
            terminal.classList.remove('translate-y-full');
            state.isTerminalOpen = true;
            updateEditorReadOnly();
            
            output.innerHTML = '<div class="text-primary">> gradlew assembleDebug</div>';
            
            // Server-Sent Events to stream terminal outputs live from Runner
            const eventSource = new EventSource('/api/build');
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.log) {
                    const p = document.createElement('div');
                    p.innerText = data.log;
                    if (data.log.includes('SUCCESSFUL')) p.className = 'text-tertiary font-bold mt-2';
                    if (data.log.includes('❌') || data.log.includes('FAILED')) p.className = 'text-error font-bold mt-2';
                    output.appendChild(p);
                    output.scrollTop = output.scrollHeight;
                }
                if (data.status) {
                    eventSource.close();
                    state.isBuilding = false;
                    loadSystemWorkspace(); // Refresh tree view to display generated builds
                }
            };

            eventSource.onerror = function() {
                eventSource.close();
                state.isBuilding = false;
                const p = document.createElement('div');
                p.className = 'text-error font-bold mt-2';
                p.innerText = '❌ Terminal logging connection broke pipeline parameters.';
                output.appendChild(p);
            };
        }

        function triggerGitHubSync() {
            showWarningDialog(
                "Push directly to GitHub",
                "This commits all saved files and pushes modifications immediately up to your GitHub branch repository.",
                "Execute Push",
                async () => {
                    closeModal();
                    showSnackbar("Push engine initiated...");
                    try {
                        const response = await fetch('/api/sync-github', { method: 'POST' });
                        const res = await response.json();
                        if (res.success) {
                            showSnackbar("Repository synchronized successfully!");
                        } else {
                            showSnackbar("Sync failed: " + res.error);
                        }
                    } catch (e) {
                        showSnackbar("Failed to execute origin push operations.");
                    }
                }
            );
        }

        function openContextMenu(file) {
            state.selectedContextFile = file;
            state.isContextMenuOpen = true;
            updateEditorReadOnly();
            
            const sheet = document.getElementById('context-sheet');
            const backdrop = document.getElementById('context-backdrop');
            const actions = document.getElementById('context-actions');
            document.getElementById('context-title').innerText = file.name;
            document.getElementById('context-subtitle').innerText = file.path || file.name;
            actions.innerHTML = '';

            const createAction = (iconKey, label, onClick, isError = false) => {
                const btn = document.createElement('button');
                btn.className = `flex items-center gap-4 px-6 py-4 hover:bg-surface-variant transition-colors ${isError ? 'text-error' : 'text-on-surface'}`;
                btn.innerHTML = `${SVGS[iconKey] || SVGS.file}<span class="font-title-md">${label}</span>`;
                btn.onclick = () => { closeContextMenu(); onClick(); };
                return btn;
            };

            if (file.isFolder) {
                actions.appendChild(createAction('add_file', 'New File', triggerNewFile));
                actions.appendChild(createAction('add_folder', 'New Folder', triggerNewFolder));
            }

            actions.appendChild(createAction('rename', 'Rename Component', triggerRename));
            actions.appendChild(createAction('delete', 'Delete Permanently', triggerDelete, true));

            backdrop.classList.add('overlay-active');
            sheet.classList.remove('translate-y-full');
        }

        function closeContextMenu() {
            state.isContextMenuOpen = false;
            document.getElementById('context-sheet').classList.add('translate-y-full');
            document.getElementById('context-backdrop').classList.remove('overlay-active');
            updateEditorReadOnly();
        }

        function showWarningDialog(title, description, confirmText, onConfirm) {
            const modal = document.getElementById('generic-modal');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-description');
            const input = document.getElementById('modal-input');
            const confirmBtn = document.getElementById('modal-confirm');
            
            state.isModalOpen = true;
            updateEditorReadOnly();
            
            titleEl.innerText = title;
            descEl.innerText = description;
            descEl.classList.remove('hidden');
            input.classList.add('hidden');
            confirmBtn.innerText = confirmText;
            confirmBtn.onclick = onConfirm;
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            state.isModalOpen = false;
            document.getElementById('generic-modal').classList.add('hidden');
            document.getElementById('modal-input').value = '';
            document.getElementById('modal-input').classList.remove('hidden');
            document.getElementById('modal-description').classList.add('hidden');
            updateEditorReadOnly();
        }

        function triggerNewFile() {
            const modal = document.getElementById('generic-modal');
            const title = document.getElementById('modal-title');
            const confirmBtn = document.getElementById('modal-confirm');
            const input = document.getElementById('modal-input');
            
            state.isModalOpen = true;
            updateEditorReadOnly();
            
            title.innerText = "New File";
            confirmBtn.innerText = "Create";
            input.classList.remove('hidden');
            input.placeholder = "filename.kt";
            modal.classList.remove('hidden');
            input.focus();
            
            confirmBtn.onclick = async () => {
                const name = input.value;
                if (name) {
                    const relativePath = (state.selectedContextFile.path ? state.selectedContextFile.path + '/' : '') + name;
                    try {
                        const response = await fetch('/api/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ filePath: relativePath, content: '' })
                        });
                        if((await response.json()).success) {
                            loadSystemWorkspace(); closeModal();
                        }
                    } catch (e) { showSnackbar("Failed to create file."); }
                }
            };
        }

        function triggerNewFolder() {
            const modal = document.getElementById('generic-modal');
            const title = document.getElementById('modal-title');
            const confirmBtn = document.getElementById('modal-confirm');
            const input = document.getElementById('modal-input');

            state.isModalOpen = true;
            updateEditorReadOnly();

            title.innerText = "New Folder";
            confirmBtn.innerText = "Create";
            input.classList.remove('hidden');
            input.placeholder = "folder_name";
            modal.classList.remove('hidden');
            input.focus();

            confirmBtn.onclick = async () => {
                const name = input.value;
                if (name) {
                    const relativePath = (state.selectedContextFile.path ? state.selectedContextFile.path + '/' : '') + name + '/.gitkeep';
                    try {
                        const response = await fetch('/api/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ filePath: relativePath, content: '' })
                        });
                        if((await response.json()).success) {
                            loadSystemWorkspace(); closeModal();
                        }
                    } catch (e) { showSnackbar("Failed to construct folder structural point."); }
                }
            };
        }

        function triggerRename() {
            const modal = document.getElementById('generic-modal');
            const input = document.getElementById('modal-input');
            const title = document.getElementById('modal-title');
            const confirmBtn = document.getElementById('modal-confirm');
            
            state.isModalOpen = true;
            updateEditorReadOnly();

            title.innerText = "Rename Operation";
            input.value = state.selectedContextFile.name;
            input.classList.remove('hidden');
            confirmBtn.innerText = "Update Name";
            modal.classList.remove('hidden');
            input.focus();
            
            confirmBtn.onclick = async () => {
                const name = input.value;
                if (name) { 
                    const baseDir = state.selectedContextFile.path.substring(0, state.selectedContextFile.path.lastIndexOf('/'));
                    const targetNewPath = (baseDir ? baseDir + '/' : '') + name;
                    
                    // Simple rename: read old structure, save to new location, delete old location
                    try {
                        await fetch('/api/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ filePath: targetNewPath, content: state.selectedContextFile.content || '' })
                        });
                        await fetch('/api/delete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ filePath: state.selectedContextFile.path })
                        });
                        forceCloseTab(state.selectedContextFile.id);
                        loadSystemWorkspace();
                        closeModal();
                    } catch (e) { showSnackbar("Rename routing failure error."); }
                }
            };
        }

        function triggerDelete() {
            showWarningDialog(
                "Delete Structural Item",
                `Are you sure you want to delete ${state.selectedContextFile.name}? This action wipes files permanently off the container server instance.`,
                "Delete Permanently",
                async () => {
                    try {
                        const response = await fetch('/api/delete', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ filePath: state.selectedContextFile.path })
                        });
                        if ((await response.json()).success) {
                            forceCloseTab(state.selectedContextFile.id);
                            loadSystemWorkspace();
                            closeModal();
                            showSnackbar("Component eliminated from system.");
                        }
                    } catch (e) { showSnackbar("Deconstruction operation failed."); }
                }
            );
        }

        window.onload = () => {
            loadSystemWorkspace();
            updateEditorReadOnly();
        };
    </script>
</body></html>
